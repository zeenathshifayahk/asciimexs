<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>asciimezs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="video" autoplay playsinline hidden></video>
  <canvas id="canvas" hidden></canvas>
  <div id="title">asciimezs</div>
  <div id="color-controls" class="controls">
    <button class="btn active" onclick="setMode('white')">White</button>
    <button class="btn" onclick="setMode('grey')">Grey</button>
    <button class="btn" onclick="setMode('green')">Green</button>
    <button class="btn" onclick="setMode('color')">Color</button>
  </div>
  <div id="char-input">
    <input type="text" id="custom-chars" placeholder="Type characters e.g. HELLO" maxlength="20">
  </div>
  <canvas id="output"></canvas>
  <button id="screenshot-btn" onclick="takeScreenshot()">📷 Screenshot</button>
  <script src="script.js"></script>
</body>
</html>
